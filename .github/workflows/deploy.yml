name: Deploy to Cloudflare

# Auto-deploy on push to main. Replaces the (missing) Cloudflare Workers Builds
# git integration so this site ships on merge like the others in the portfolio.
# Runs `wrangler deploy` only — IndexNow/GSC submission stays out of CI (separate
# quota + secrets); those run from the dashboard/cron as needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.95.0"
          command: deploy
